apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: lovablecloneinfo@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
      # The *.previews wildcard can't use HTTP-01, so it's routed to the
      # GoDaddy DNS-01 webhook instead via this selector.
      - selector:
          dnsNames:
            - "*.previews.lovableclone.in"
        dns01:
          webhook:
            groupName: acme.lovableclone.in
            solverName: godaddy
            config:
              apiKeySecretRef:
                name: godaddy-api-key-prod
                key: key
                secret: secret
              production: true
              ttl: 600
