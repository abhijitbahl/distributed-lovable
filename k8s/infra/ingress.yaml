apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lovable-main-ingress
  namespace: lovable-core
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: "nginx"
  tls:
    - hosts:
        - lovableclone.in
        - www.lovableclone.in
        - api.lovableclone.in
      secretName: lovableclone-tls
    # Issued via the GoDaddy DNS-01 solver (selector-scoped in the
    # ClusterIssuer), since HTTP-01 can't cover a wildcard host.
    - hosts:
        - "*.previews.lovableclone.in"
      secretName: previews-lovableclone-wildcard-tls
  rules:
  # 1. Main Website Route (The Frontend!)
  - host: "lovableclone.in"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lovable-frontend
            port:
              number: 80
              
  - host: "www.lovableclone.in"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lovable-frontend
            port:
              number: 80

  # 2. Previews Route
  - host: "*.previews.lovableclone.in"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lovable-me-proxy
            port:
              number: 80
  
  # 3. API Gateway Route
  - host: "api.lovableclone.in"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80